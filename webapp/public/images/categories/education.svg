<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Graduation cap -->
  <g transform="translate(400, 200)">
    <!-- Cap top (diamond shape) -->
    <polygon points="0,-60 180,0 0,60 -180,0" fill="#C9A84C" opacity="0.85"/>
    <!-- Cap brim shadow -->
    <polygon points="0,60 180,0 180,15 0,75 -180,15 -180,0" fill="#A8882E" opacity="0.6"/>
    <!-- Button on top -->
    <circle cx="0" cy="0" r="10" fill="#E8C547"/>
    <!-- Tassel string -->
    <path d="M0 0 Q40 40 35 100 Q32 130 40 160" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.7"/>
    <circle cx="40" cy="165" r="8" fill="#C9A84C" opacity="0.7"/>
  </g>
  <!-- Open book -->
  <g transform="translate(400, 380)">
    <!-- Left page -->
    <path d="M-10 0 Q-80 -10 -140 10 L-140 80 Q-80 60 -10 70 Z" fill="#2a2a3a" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
    <!-- Right page -->
    <path d="M10 0 Q80 -10 140 10 L140 80 Q80 60 10 70 Z" fill="#2a2a3a" stroke="#C9A84C" stroke-width="1.5" opacity="0.7"/>
    <!-- Spine -->
    <line x1="0" y1="-5" x2="0" y2="75" stroke="#C9A84C" stroke-width="2" opacity="0.5"/>
    <!-- Text lines left -->
    <line x1="-120" y1="25" x2="-30" y2="20" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
    <line x1="-115" y1="38" x2="-35" y2="33" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
    <line x1="-110" y1="51" x2="-30" y2="47" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
    <!-- Text lines right -->
    <line x1="30" y1="20" x2="120" y2="25" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
    <line x1="35" y1="33" x2="115" y2="38" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
    <line x1="30" y1="47" x2="110" y2="51" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
  </g>
  <!-- Decorative stars -->
  <circle cx="150" cy="120" r="3" fill="#C9A84C" opacity="0.3"/>
  <circle cx="650" cy="150" r="2" fill="#C9A84C" opacity="0.25"/>
  <circle cx="680" cy="100" r="3" fill="#C9A84C" opacity="0.2"/>
  <circle cx="120" cy="450" r="2" fill="#C9A84C" opacity="0.2"/>
</svg>